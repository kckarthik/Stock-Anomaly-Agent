# ================================================================
#  Stock Market Anomaly Investigation Agent
#  Full local Docker stack — no cloud, no paid APIs
#
#  LLM Observability: Langfuse (self-hosted, localhost:3002)
#  + fallback traces in TimescaleDB obs.llm_traces
#
#  Start:  chmod +x start.sh && ./start.sh
#  Stop:   ./stop.sh
# ================================================================

networks:
  stock_net:
    driver: bridge

volumes:
  minio_data:
  timescale_data:
  langfuse_postgres_data:
  redis_data:
  kafka_data:
  grafana_data:
  prometheus_data:
  ollama_data:

services:

  # ──────────────────────────────────────────────────────────────
  # KAFKA (KRaft mode — no Zookeeper)
  #
  # Uses Bitnami image which handles KRaft storage formatting
  # automatically — no manual kafka-storage format step needed.
  # Much more reliable for local dev than cp-kafka KRaft.
  # ──────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: stock-kafka
    hostname: kafka
    networks: [stock_net]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      # Must be a base64-encoded UUID (22 chars = 16 bytes). Generate with:
      #   docker run --rm confluentinc/cp-kafka:7.5.0 kafka-storage random-uuid
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
      

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: stock-kafka-ui
    networks: [stock_net]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: stock-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started   # healthy takes too long — UI reconnects on its own

  # ──────────────────────────────────────────────────────────────
  # MINIO — local S3 (Bronze + Silver Parquet)
  # Console: http://localhost:9001  (minioadmin / minioadmin)
  # ──────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: stock-minio
    networks: [stock_net]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc:latest
    container_name: stock-minio-setup
    networks: [stock_net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb -p local/bronze &&
        mc mb -p local/silver &&
        echo 'MinIO buckets ready'
      "

  # ──────────────────────────────────────────────────────────────
  # TIMESCALEDB — PostgreSQL + time-series
  # Stores: Silver OHLCV, Gold tables, agent reports, LLM traces
  # ──────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: stock-timescaledb
    networks: [stock_net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock123
      POSTGRES_DB: stockdb
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────────────────────
  # REDIS — Celery broker + result backend
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stock-redis
    networks: [stock_net]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────────────────────────────────────────────────────────
  # OLLAMA — local LLM server (Qwen2.5:0.5b)
  # Model auto-downloaded on first run (~400MB)
  # ──────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: stock-ollama
    networks: [stock_net]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  ollama-setup:
    image: ollama/ollama:latest
    container_name: stock-ollama-setup
    networks: [stock_net]
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5:0.5b &&
        echo 'Qwen2.5 0.5b ready'
      "
    volumes:
      - ollama_data:/root/.ollama


  # ──────────────────────────────────────────────────────────────
  # LANGFUSE — LLM observability (self-hosted, no internet needed)
  # UI: http://localhost:3002
  # On first visit: sign up with any email/password (fully local)
  # Then: Settings → API Keys → copy keys → paste into .env
  # ──────────────────────────────────────────────────────────────
  langfuse-postgres:
    image: postgres:15-alpine
    container_name: stock-langfuse-postgres
    networks: [stock_net]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse123
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    container_name: stock-langfuse
    networks: [stock_net]
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse123@langfuse-postgres:5432/langfuse
      NEXTAUTH_SECRET: local-stock-agent-secret-key-change-me
      SALT: local-stock-agent-salt-change-me
      NEXTAUTH_URL: http://localhost:3002
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    # start_period: 120s gives DB migrations time to finish
    # before healthcheck starts counting failures
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/public/health || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 120s
    restart: on-failure

  # ──────────────────────────────────────────────────────────────
  # PROMETHEUS — metrics scraping
  # ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stock-prometheus
    networks: [stock_net]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ──────────────────────────────────────────────────────────────
  # GRAFANA — all dashboards including LLM trace viewer
  # UI: http://localhost:3001  (admin / admin)
  # ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: stock-grafana
    networks: [stock_net]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - timescaledb
      - prometheus

  # ──────────────────────────────────────────────────────────────
  # FLOWER — Celery task monitoring
  # UI: http://localhost:5555
  # ──────────────────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: stock-flower
    networks: [stock_net]
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
    depends_on:
      redis:
        condition: service_healthy
    command: celery flower --broker=redis://redis:6379/0

  # ──────────────────────────────────────────────────────────────
  # PRODUCER — yfinance poller → Kafka
  # ──────────────────────────────────────────────────────────────
  producer:
    build:
      context: ./services/producer
      dockerfile: Dockerfile
    container_name: stock-producer
    networks: [stock_net]
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ──────────────────────────────────────────────────────────────
  # CONSUMER — Kafka → Bronze → Silver
  # ──────────────────────────────────────────────────────────────
  consumer:
    build:
      context: ./services/consumer
      dockerfile: Dockerfile
    container_name: stock-consumer
    networks: [stock_net]
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: on-failure
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ──────────────────────────────────────────────────────────────
  # DBT RUNNER — Silver → Gold every 5 min
  # ──────────────────────────────────────────────────────────────
  dbt-runner:
    build:
      context: ./services/agent
      dockerfile: Dockerfile.dbt
    container_name: stock-dbt
    networks: [stock_net]
    ports:
      - "8003:8003"
    env_file: .env
    volumes:
      - ./dbt:/app/dbt
    depends_on:
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: on-failure

  # ──────────────────────────────────────────────────────────────
  # CELERY WORKER — runs investigation tasks (2 parallel)
  # ──────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    container_name: stock-celery-worker
    networks: [stock_net]
    env_file: .env
    command: celery -A tasks worker --loglevel=info --concurrency=2 -Q high,medium,low
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      ollama:
        condition: service_started   # service_started — Ollama is slow on CPU-only hosts
      langfuse:
        condition: service_started   # started not healthy — migrations take 60-90s
    restart: on-failure
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ──────────────────────────────────────────────────────────────
  # AGENT SCHEDULER — reads anomaly_feed, dispatches Celery tasks
  # ──────────────────────────────────────────────────────────────
  agent-scheduler:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    container_name: stock-agent-scheduler
    networks: [stock_net]
    ports:
      - "8004:8004"
    env_file: .env
    command: python scheduler.py
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      ollama:
        condition: service_started   # service_started — Ollama is slow on CPU-only hosts
      langfuse:
        condition: service_started   # started not healthy — migrations take 60-90s
    restart: on-failure

  # ──────────────────────────────────────────────────────────────
  # FASTAPI — REST + natural language query endpoint
  # Docs: http://localhost:8080/docs
  # ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: stock-api
    networks: [stock_net]
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      ollama:
        condition: service_started   # service_started — Ollama is slow on CPU-only hosts
    restart: on-failure
